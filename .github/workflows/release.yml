name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npx electron-builder --win portable --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: release/*.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npx electron-builder --mac dmg --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-dmg
          path: release/*.dmg
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Rename assets
        run: |
          mkdir -p release-assets
          find artifacts -type f -maxdepth 3 -print
          cp artifacts/windows-portable/*.exe release-assets/YunQiao-Image-Studio-${GITHUB_REF_NAME#v}-win-x64-portable.exe
          cp artifacts/macos-x64-dmg/*.dmg release-assets/YunQiao-Image-Studio-${GITHUB_REF_NAME#v}-mac-x64.dmg
          cp artifacts/macos-arm64-dmg/*.dmg release-assets/YunQiao-Image-Studio-${GITHUB_REF_NAME#v}-mac-arm64.dmg
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: YunQiao Image Studio ${{ github.ref_name }}
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
